<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Crash Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>✈️ Aviator Crash Game</h1>
            <p>Watch the plane fly and cash out before it crashes!</p>
        </header>

        <div class="game-container">
            <div class="panel betting-panel">
                <div class="balance-display">
                    Balance: $<span id="balance">1000.00</span>
                </div>
                
                <div class="game-status waiting" id="gameStatus">
                    Waiting for next round...
                </div>

                <div class="bet-controls">
                    <div class="bet-input-group">
                        <label for="betAmount">Bet Amount ($)</label>
                        <input type="number" id="betAmount" class="bet-input" value="10" min="1" max="1000" step="1">
                    </div>

                    <div class="auto-cashout">
                        <input type="checkbox" id="autoCashoutEnabled">
                        <input type="number" id="autoCashoutMultiplier" class="auto-cashout-input" placeholder="Auto cashout at" min="1.1" max="100" step="0.1">
                    </div>

                    <button id="betButton" class="bet-button bet">Place Bet</button>
                    <button id="cashoutButton" class="bet-button cashout" disabled>Cash Out</button>
                </div>
            </div>

            <div class="game-area" id="gameArea">
                <div class="grid-overlay"></div>
                <div class="multiplier-display" id="multiplierDisplay">1.00x</div>
                <div class="plane" id="plane">
                    <div class="plane-icon">✈️</div>
                </div>
            </div>

            <div class="panel history-panel">
                <h3>Game History</h3>
                <div id="historyList"></div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
